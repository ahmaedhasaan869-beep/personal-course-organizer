<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Course | Ahmed Hassan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header>
    <a class="logo" href="index.html">COURSE<span>HUB</span></a>

    <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <nav>
      <ul id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">My Courses</a></li>
        <li><a href="add-course.html" class="active">Add Course</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main>

    <!-- Banner -->
    <div class="page-banner">
      <h2 class="section-title">ADD COURSE</h2>
      <div class="divider"></div>
      <p class="section-subtitle">Register a new course to your semester schedule.</p>
    </div>

    <!-- Form -->
    <section>
      <div class="form-card">

        <div id="successMsg" style="display:none; background:rgba(0,200,100,0.1); border:1px solid rgba(0,200,100,0.3);
             color:#00cc66; border-radius:10px; padding:1rem 1.2rem; margin-bottom:1.5rem; font-size:0.95rem;">
          ✅ Course added successfully! <a href="courses.html" style="color:#00cc66; font-weight:600;">View My Courses →</a>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="courseName">Course Name *</label>
            <input type="text" id="courseName" placeholder="e.g. Internet Technology" required />
          </div>
          <div class="form-group">
            <label for="courseCode">Course Code *</label>
            <input type="text" id="courseCode" placeholder="e.g. CS301" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="instructor">Instructor Name *</label>
            <input type="text" id="instructor" placeholder="e.g. Dr. Mohamed Ali" required />
          </div>
          <div class="form-group">
            <label for="credits">Credit Hours *</label>
            <select id="credits" required>
              <option value="" disabled selected>Select credits</option>
              <option value="1">1 Credit Hour</option>
              <option value="2">2 Credit Hours</option>
              <option value="3">3 Credit Hours</option>
              <option value="4">4 Credit Hours</option>
              <option value="5">5 Credit Hours</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="schedule">Schedule</label>
            <input type="text" id="schedule" placeholder="e.g. Sun / Tue – 10:00 AM" />
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="active">Active</option>
              <option value="progress">In Progress</option>
              <option value="pending">Pending</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Any additional notes about this course..."></textarea>
        </div>

        <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-top:0.5rem;">
          <button class="btn-primary" onclick="submitForm()">➕ Add Course</button>
          <button class="btn-secondary" onclick="resetForm()">Reset</button>
        </div>

      </div>
    </section>

  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer>
    <p>© 2026 <span>Ahmed Hassan Ezzelarab</span> · Capital University – Computer Science · All Rights Reserved</p>
  </footer>

  <script>
    function toggleNav() {
      document.getElementById('navMenu').classList.toggle('open');
    }

    function submitForm() {
      const name     = document.getElementById('courseName').value.trim();
      const code     = document.getElementById('courseCode').value.trim();
      const instr    = document.getElementById('instructor').value.trim();
      const credits  = document.getElementById('credits').value;

      if (!name || !code || !instr || !credits) {
        alert('Please fill in all required fields (*).');
        return;
      }

      document.getElementById('successMsg').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      ['courseName','courseCode','instructor','schedule','notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('credits').value = '';
      document.getElementById('status').value  = 'active';
      document.getElementById('successMsg').style.display = 'none';
    }
  </script>

</body>
</html>
